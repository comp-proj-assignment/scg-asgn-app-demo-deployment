apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    blueGreen:
      activeService: frontend-stable
      previewService: frontend-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 300
      abortScaleDownDelaySeconds: 30
      prePromotionAnalysis:
        templates: [{ templateName: frontend-success-rate }]
        args: [{ name: service-name, value: frontend-preview }]
      postPromotionAnalysis:
        templates: [{ templateName: frontend-success-rate }]
        args: [{ name: service-name, value: frontend-stable }]
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: public.ecr.aws/c5a3w2d1/frontend:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
          env:
            - name: NEXT_PUBLIC_CONFIG_PATH
              value: /etc/frontend/settings.yml
            - name: BACKEND_URL
              value: http://backend-stable
            - name: NEXT_PUBLIC_APP_VERSION
              value: "dev"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ROLLOUT_COLOR
              value: "blue"
          volumeMounts:
            - { name: settings,    mountPath: /etc/frontend, readOnly: true }
            - { name: tmp,         mountPath: /tmp }
            - { name: next-cache,  mountPath: /app/.next/cache }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          # Probe a frontend-local route (NOT /api/*, which proxies to backend).
          livenessProbe:
            httpGet: { path: /meta, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /meta, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      volumes:
        - name: settings
          configMap:
            name: frontend-settings
        - name: tmp
          emptyDir: { sizeLimit: 128Mi }
        - name: next-cache
          emptyDir: { sizeLimit: 256Mi }
