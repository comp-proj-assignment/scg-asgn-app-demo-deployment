apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  labels: { app.kubernetes.io/name: frontend }
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    # host patched per env (envs/<env>/kustomization.yaml)
    - host: frontend.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-stable
                port: { number: 80 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-stable
                port: { number: 80 }
