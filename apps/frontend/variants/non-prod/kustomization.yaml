apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Env-class label only. Strategy is blue-green via base/rollout.yaml.
# so sit can compose this (for the non-prod label) without losing
# the analysis-gated blue-green promotion.

patches:
  - target: { kind: Rollout, name: frontend }
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/comp.io~1env-class
        value: non-prod
