apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Opt-in blue-green for the frontend tier. See backend/variants/strategy-bluegreen
# for the full tradeoff discussion.

resources:
  - preview-service.yaml

patches:
  - target: { kind: Rollout, name: frontend }
    patch: |-
      - op: remove
        path: /spec/strategy/canary
      - op: add
        path: /spec/strategy/blueGreen
        value:
          activeService: frontend-stable
          previewService: frontend-preview
          autoPromotionEnabled: false
          scaleDownDelaySeconds: 300
          abortScaleDownDelaySeconds: 30
          prePromotionAnalysis:
            templates:
              - templateName: frontend-success-rate
            args:
              - name: service-name
                value: frontend-preview
          postPromotionAnalysis:
            templates:
              - templateName: frontend-success-rate
            args:
              - name: service-name
                value: frontend-stable
