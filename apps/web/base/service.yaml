apiVersion: v1
kind: Service
metadata:
  name: web-stable
  labels: { app.kubernetes.io/name: web }
spec:
  selector: { app.kubernetes.io/name: web }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: v1
kind: Service
metadata:
  name: web-canary
  labels: { app.kubernetes.io/name: web }
spec:
  selector: { app.kubernetes.io/name: web }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  labels: { app.kubernetes.io/name: web }
