apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Opt-in blue-green for the web tier. See api/variants/strategy-bluegreen
# for the full tradeoff discussion.

resources:
  - preview-service.yaml

patches:
  - target: { kind: Rollout, name: web }
    patch: |-
      - op: remove
        path: /spec/strategy/canary
      - op: add
        path: /spec/strategy/blueGreen
        value:
          activeService: web-stable
          previewService: web-preview
          autoPromotionEnabled: false
          scaleDownDelaySeconds: 300
          abortScaleDownDelaySeconds: 30
          prePromotionAnalysis:
            templates:
              - templateName: web-success-rate
            args:
              - name: service-name
                value: web-preview
          postPromotionAnalysis:
            templates:
              - templateName: web-success-rate
            args:
              - name: service-name
                value: web-stable
