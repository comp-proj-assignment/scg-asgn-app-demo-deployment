apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Fast canary for envs that don't gate on analysis (dev, qa).
# Staging is intentionally NOT composing this — we want the same
# full canary + analysis there as in prod.

patches:
  - target: { kind: Rollout, name: web }
    patch: |-
      - op: replace
        path: /spec/strategy/canary/steps
        value:
          - setWeight: 50
          - pause: { duration: 30s }
          - setWeight: 100
