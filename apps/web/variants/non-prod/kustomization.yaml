apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Env-class label only. Canary cadence is now in variants/canary-fast,
# so staging can compose this (for the non-prod label) without losing
# the analysis-gated canary.

patches:
  - target: { kind: Rollout, name: web }
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/comp.io~1env-class
        value: non-prod
