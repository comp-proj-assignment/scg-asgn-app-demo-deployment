apiVersion: v1
kind: Service
metadata:
  name: backend-stable
  labels: { app.kubernetes.io/name: backend }
spec:
  selector: { app.kubernetes.io/name: backend }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-preview
  labels: { app.kubernetes.io/name: backend }
spec:
  selector: { app.kubernetes.io/name: backend }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  labels: { app.kubernetes.io/name: backend }
