apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: comp-proj-sit

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      comp.io/env: sit
resources:
  - ../../base

components:
  - ../../variants/non-prod

patches:
  - target: { kind: PodDisruptionBudget, name: backend }
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 0
  - path: version.yml
    target: { kind: Rollout, name: backend }
  - path: replicas.yml
    target: { kind: Rollout, name: backend }

configMapGenerator:
  - name: backend-settings
    files: [settings.yml]
  - name: backend-static
    files: [static.yml]
