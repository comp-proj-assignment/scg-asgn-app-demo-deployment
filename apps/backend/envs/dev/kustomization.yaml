apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backend-dev

resources:
  - ../../base

components:
  - ../../variants/non-prod
  - ../../variants/canary-fast

# Image tag tracked in version.yml so promotion is a single-file copy.
images:
  - name: public.ecr.aws/c5a3w2d1/backend
    newTag: dev-placeholder      # overridden by version.yml via patch below

patches:
  - path: version.yml
    target: { kind: Rollout, name: backend }
  - path: replicas.yml
    target: { kind: Rollout, name: backend }

# Hash-suffixed ConfigMap from the env-specific settings.yml.
# A change here produces a new ConfigMap name + new Rollout revision.
configMapGenerator:
  - name: backend-settings
    files:
      - settings.yml

# Static.yml holds env-bound values (DB URL, region) — separate
# ConfigMap so it doesn't churn the settings hash on env-bound edits.
  - name: backend-static
    files:
      - static.yml
