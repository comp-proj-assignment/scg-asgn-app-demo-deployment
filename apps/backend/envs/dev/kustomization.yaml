apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: comp-proj-dev

resources:
  - ../../base

components:
  - ../../variants/non-prod

# Image tag is set by the JSON patch in version.yml (which CI overwrites
# on each dev bump). No `images:` transformer — it would run AFTER
# patches and clobber the real tag with the placeholder.
patches:
  - path: version.yml
    target: { kind: Rollout, name: backend }
  - path: replicas.yml
    target: { kind: Rollout, name: backend }

# Hash-suffixed ConfigMap from the env-specific settings.yml.
# A change here produces a new ConfigMap name + new Rollout revision.
configMapGenerator:
  - name: backend-settings
    files:
      - settings.yml

# Static.yml holds env-bound values (DB URL, region) — separate
# ConfigMap so it doesn't churn the settings hash on env-bound edits.
  - name: backend-static
    files:
      - static.yml
