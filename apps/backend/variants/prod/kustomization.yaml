apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Shared characteristics of every prod env (single-region today, but
# this variant is what every future prod cell will compose).

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      comp.io/env-class: prod

patches:
  - target: { kind: Rollout, name: backend }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi

  - target: { kind: PodDisruptionBudget, name: backend }
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
