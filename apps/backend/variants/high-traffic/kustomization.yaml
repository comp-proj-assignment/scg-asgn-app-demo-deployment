apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Composed by any env that needs higher baseline capacity (currently
# just prod, but staging may opt in for load-test windows).

resources:
  - hpa.yaml

patches:
  - target: { kind: PodDisruptionBudget, name: backend }
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 3
