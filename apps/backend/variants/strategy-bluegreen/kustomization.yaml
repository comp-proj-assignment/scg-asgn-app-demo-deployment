apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Opt-in blue-green strategy. Composing this in an env's components
# replaces the base canary strategy with a blue-green cutover.
#
# Tradeoffs vs canary:
#   + One-step traffic cutover, instant rollback (just flip back).
#   + No traffic-split mesh required (active/preview services only).
#   - Doubles pod count for the duration of the rollout window.
#   - Pre-promotion analysis runs against preview pods, but you can't
#     gate at intermediate weights — it's all-or-nothing.
#
# The backend-canary Service from base/ becomes unused while this variant
# is active; we leave it (cheap) so toggling back to canary is just
# removing this component from the env's kustomization.

resources:
  - preview-service.yaml

patches:
  - target: { kind: Rollout, name: backend }
    patch: |-
      - op: remove
        path: /spec/strategy/canary
      - op: add
        path: /spec/strategy/blueGreen
        value:
          activeService: backend-stable
          previewService: backend-preview
          autoPromotionEnabled: false        # require manual promote via UI/CLI
          scaleDownDelaySeconds: 300         # keep old RS for 5m post-promote (fast rollback)
          abortScaleDownDelaySeconds: 30
          prePromotionAnalysis:
            templates:
              - templateName: backend-success-rate
            args:
              - name: service-name
                value: backend-preview
          postPromotionAnalysis:
            templates:
              - templateName: backend-success-rate
            args:
              - name: service-name
                value: backend-stable
