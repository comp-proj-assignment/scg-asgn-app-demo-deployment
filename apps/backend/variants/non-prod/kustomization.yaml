apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Marks the workload as non-prod (used for scheduling, NetworkPolicy,
# and observability filters). Composed by dev, sit, uat, AND preprod.
#
# Canary cadence is a separate concern — see variants/canary-fast for
# the fast non-analysis cadence, or compose nothing extra to inherit
# the base full canary with analysis (what sit does).

patches:
  - target: { kind: Rollout, name: backend }
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/comp.io~1env-class
        value: non-prod
