apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Marks the workload as non-prod across labels, selectors, and pod-template.
# Composed by dev, sit, uat, AND preprod. Strategy stays blue-green from
# base/rollout.yaml; this variant only adds the env-class identity label.

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      comp.io/env-class: non-prod
