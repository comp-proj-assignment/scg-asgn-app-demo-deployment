apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: api-prod

resources:
  - ../../base

components:
  - ../../variants/prod
  - ../../variants/high-traffic

patches:
  - path: version.yml
    target: { kind: Rollout, name: api }
  - path: replicas.yml
    target: { kind: Rollout, name: api }

configMapGenerator:
  - name: api-settings
    files: [settings.yml]
  - name: api-static
    files: [static.yml]
