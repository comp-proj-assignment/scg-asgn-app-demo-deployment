# Promotable business settings. Editing this file produces a new
# hash-suffixed ConfigMap → new Rollout revision → canary rollout.
logging:
  level:
    root: INFO
    com.comp.api: DEBUG
  format: text

server:
  shutdown: graceful
  http:
    timeout: 10s

features:
  newSearch: true
  darkMode: true
  experimentalCheckout: true
