# One-time bootstrap. Apply manually with:
#   kubectl apply -f argocd/bootstrap.yaml
#
# After that, Argo CD watches this directory itself — any change to
# comp-proj.yaml or all-services.yaml lands via git push, no more
# kubectl apply.
#
# Lives in the default AppProject because comp-proj doesn't exist yet
# at the moment this is applied (it's created by syncing this app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: platform-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/scg-sre/scg-asgn-app-demo-deployment
    targetRevision: main
    path: argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
  revisionHistoryLimit: 5
